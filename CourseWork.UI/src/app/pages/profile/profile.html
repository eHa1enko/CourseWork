<div class="profile-page">
  <div class="profile-card">
    <div class="avatar">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
      </svg>
    </div>
    <div class="profile-info">
      <h1 class="username">{{ auth.currentUser?.username }}</h1>
      <p class="email">{{ auth.currentUser?.email }}</p>
      @if (auth.currentUser?.isAdmin) {
        <span class="badge admin-badge">Admin</span>
      } @else {
        <span class="badge user-badge">User</span>
      }
    </div>
  </div>

  <div class="profile-details">
    <div class="detail-row">
      <span class="detail-label">Username</span>
      <span class="detail-value">{{ auth.currentUser?.username }}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Email</span>
      <span class="detail-value">{{ auth.currentUser?.email }}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Role</span>
      <span class="detail-value">{{ auth.currentUser?.isAdmin ? 'Administrator' : 'User' }}</span>
    </div>
  </div>
</div>
