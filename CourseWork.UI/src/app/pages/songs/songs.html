<div class="page">
  <h1>Songs</h1>

  @if (loading()) {
    <p class="state-msg">Loading...</p>
  } @else if (songs().length === 0) {
    <p class="state-msg">No songs found.</p>
  } @else {
    <div class="song-list">
      @for (song of songs(); track song.id; let i = $index) {
        <div class="song-row" [class.active]="isCurrentSong(song)" (click)="playSong(song)">
          <div class="song-index">
            @if (isCurrentSong(song)) {
              <svg class="playing-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
              </svg>
            } @else {
              {{ i + 1 }}
            }
          </div>
          <img class="song-cover" [src]="apiBase + song.coverUrl" [alt]="song.title" />
          <div class="song-meta">
            <span class="song-title">{{ song.title }}</span>
            <span class="song-artist">{{ song.artistName }}</span>
          </div>
          <span class="song-duration">{{ formatDuration(song.duration) }}</span>
        </div>
      }
    </div>
  }
</div>
